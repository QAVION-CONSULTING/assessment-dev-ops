##Anfang Stages of the pipeline / Globaler Bereich ------------------

stages:
  - lint
  - test
  - build
  - docker
  - secret-detection
##Ende Stages of the pipeline ------------------

variables:
  SECRET_DETECTION_ENABLED: 'true'

##Ende Globaler Bereich ------------------

##Anfang JOBS-Bereich ------------------

lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install flake8
  script:
    - flake8 backend/app

test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -r backend/requirements.txt
    - pip install pytest
  script:
    - pytest

#docker-build:
